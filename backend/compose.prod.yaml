# Production overrides — applies Traefik reverse proxy configuration.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d

services:
  analytics:
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.rule=Host(`analytics.${DOMAIN}`)
      - traefik.http.services.umami.loadbalancer.server.port=3000

  comments:
    environment:
      BASE_URL: https://comments.${DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.http.routers.comments.rule=Host(`comments.${DOMAIN}`)
      - traefik.http.services.comments.loadbalancer.server.port=80

networks:
  default:
    name: backend
  proxy:
    name: proxy
    external: true
