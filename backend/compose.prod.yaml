# Production overrides — applies Traefik reverse proxy configuration.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d

services:
  analytics:
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-analytics.rule=Host(`analytics.${DOMAIN}`)
      - traefik.http.services.backend-analytics.loadbalancer.server.port=3000

  comments:
    environment:
      BASE_URL: https://comments.${DOMAIN}
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-comments.rule=Host(`comments.${DOMAIN}`)
      - traefik.http.services.backend-comments.loadbalancer.server.port=80
    volumes:
      - /etc/comentario/secrets.yaml:/comentario/secrets.yaml:ro

networks:
  default:
    name: backend
  proxy:
    name: proxy
    external: true
