services:
  comments:
    image: ghcr.io/umputun/remark42:latest
    restart: unless-stopped
    environment:
      REMARK_URL: ${COMMENTS_HOST:-http://localhost:8080}
      SITE: ${COMMENTS_SITE_ID:-frasermclean-dev}
      SECRET: supers3cret!
      AUTH_ANON: 'true' # enable anonymous commenting
      NOTIFY_ADMINS: webhook
      NOTIFY_WEBHOOK_URL: ${COMMENTS_NOTIFY_WEBHOOK_URL}
      NOTIFY_WEBHOOK_TEMPLATE: |
        * **User**: {{ .User.Name }}
        * **Post**: [{{ .Locator.URL }}]({{ .Locator.URL }})
        * **Timestamp**: {{ .Timestamp }}

        {{ .Orig }}
      NOTIFY_WEBHOOK_HEADERS: 'X-Title:New Comment,X-Markdown:true,X-Tags:new'
    volumes:
      - comments-data:/srv/var
    ports:
      - 8080:8080

volumes:
  comments-data:
    driver: local
